# ==============================================================
# TechMart WAF — Règles ModSecurity personnalisées
# Lab Sécurité Web — Usage pédagogique
# ==============================================================

# ── Configuration de l'Audit Log ──────────────────────────────
# On enregistre les événements pour analyse ultérieure dans Grafana/Loki
SecAuditLog /var/log/nginx/modsec_audit.log
SecAuditLogFormat JSON
SecAuditEngine RelevantOnly
SecAuditLogParts ABIJDEFHZ

# ── Initialisation des collections ────────────────────────────
# Permet de suivre les IP pour le Rate Limiting et le Brute Force
SecAction "id:900001,phase:1,initcol:ip=%{REMOTE_ADDR},nolog,pass"


# ==============================================================
# 1. DÉTECTION DE SCANNERS & OUTILS D'ATTAQUE
# ==============================================================

# 1.1 Blocage par User-Agent (Outils connus)
SecRule REQUEST_HEADERS:User-Agent \
  "@rx (?i)(sqlmap|nikto|nmap|nmap-http|masscan|dirb|gobuster|wfuzz|hydra|burpsuite|zaproxy|acunetix|nuclei|metasploit|python-requests|curl\/[0-9]|wget\/[0-9])" \
  "id:1001,phase:1,deny,status:403,log,msg:'Scanner/Attack tool detected by User-Agent'"

# 1.2 Détection d'absence de User-Agent
SecRule &REQUEST_HEADERS:User-Agent "@eq 0" \
  "id:1002,phase:1,deny,status:403,log,msg:'Missing User-Agent header'"

# 1.3 Tentative d'accès à des fichiers sensibles / Chemins suspects
SecRule REQUEST_URI \
  "@rx (?i)(\/\.git\/|\/\.env|\/\.htaccess|\/wp-admin|\/phpmyadmin|\/etc\/passwd|\/proc\/self)" \
  "id:1010,phase:1,deny,status:403,log,msg:'Scanner path probe detected'"


# ==============================================================
# 2. SQL INJECTION (SQLi)
# ==============================================================

# 2.1 Patterns SQLi classiques (UNION, SELECT, SLEEP...)
SecRule ARGS|REQUEST_URI \
  "@rx (?i)(union[\s\+\/\*]+select|select[\s\+\/\*]+.*from|insert[\s\+]+into|drop[\s\+]+table|sleep\s*\(|benchmark\s*\(|waitfor[\s\+]+delay)" \
  "id:1101,phase:2,deny,status:403,log,msg:'SQL Injection detected'"

# 2.2 CORRECTION : SQLi dans l'API (Utilisation correcte de chain)
# RÈGLE : L'action disruptive (deny) doit être sur la règle qui COMMENCE la chaîne.
SecRule REQUEST_URI "@rx ^/api/" \
  "id:1105,phase:2,deny,status:403,log,msg:'SQLi in API endpoint',chain"
    SecRule ARGS|REQUEST_URI "@rx (?i)(%27|%22.*select|union.*select.*from)"

# Règle améliorée pour contrer les ruses de sqlmap
SecRule ARGS "@rx (union.*select|select.*from|order.*by)" \
  "id:1120,phase:2,\
  t:lowercase,t:removeComments,t:urlDecodeUni,t:htmlEntityDecode,\
  deny,status:403,log,\
  msg:'SQLMap Bypass attempt detected (normalized)'"

# ==============================================================
# 3. XSS — CROSS-SITE SCRIPTING
# ==============================================================

SecRule ARGS \
  "@rx (?i)(<\s*script[\s>\/]|<\s*iframe[\s>]|javascript\s*:|on(error|load|click|mouseover)\s*=)" \
  "id:1201,phase:2,deny,status:403,log,msg:'XSS detected'"


# ==============================================================
# 4. BRUTE FORCE — PROTECTION LOGIN
# ==============================================================

# 4.1 Incrémenter le compteur de tentatives de login
SecRule REQUEST_URI "@rx ^/(login|api/v1/auth/login)" \
  "id:1501,phase:2,pass,nolog,setvar:ip.login_attempt=+1,expirevar:ip.login_attempt=300"

# 4.2 Blocage automatique si > 5 tentatives en 5 minutes
SecRule IP:login_attempt "@gt 5" \
  "id:1502,phase:2,deny,status:429,log,msg:'Brute force detected — login attempts exceeded'"


# ==============================================================
# 5. INJECTION DE COMMANDES (RCE) & TRAVERSAL
# ==============================================================

# Détection de commandes système (ls, cat, id, whoami...)
SecRule ARGS \
  "@rx (?i)(;\s*(ls|cat|id|whoami|pwd|uname|wget|curl)\s|&&|\|\||`[^`]+`|\$\s*\()" \
  "id:1601,phase:2,deny,status:403,log,msg:'Command Injection / RCE attempt'"

# Path Traversal (../../)
SecRule REQUEST_URI|ARGS \
  "@rx (\.\.\/|\.\.\\\\|%2e%2e%2f|\/etc\/passwd)" \
  "id:1801,phase:1,deny,status:403,log,msg:'Path Traversal / LFI detected'"


# ==============================================================
# 6. RATE LIMITING GLOBAL
# ==============================================================

# On compte chaque requête
SecRule REQUEST_URI "@rx ." \
  "id:2000,phase:1,pass,nolog,setvar:ip.requests=+1,expirevar:ip.requests=60"

# Si plus de 300 requêtes par minute, on bloque temporairement l'IP
SecRule IP:requests "@gt 10" \
  "id:2001,phase:1,deny,status:429,log,msg:'Global rate limit exceeded'"

# ==============================================================
# FIN DU FICHIER
# ==============================================================


# Transformations appliquées avant évaluation de la règle
SecRule ARGS \
  "@rx (?i)(union|select|from|where)" \
  "id:1110,phase:2,\
  t:lowercase,t:removeComments,t:urlDecodeUni,t:htmlEntityDecode,\
  deny,status:403,log,\
  msg:'SQLi detected after normalization'"


# 1. Bloquer l'usage de CHR() pour l'exfiltration (utilisé par ton sqlmap)
SecRule ARGS "@rx (?i)chr\s*\(\d+\)" \
    "id:1130,phase:2,t:lowercase,t:urlDecodeUni,deny,status:403,log,msg:'SQLi Bypass attempt: CHR function usage detected'"

# 2. Renforcer la détection UNION (incluant UNION ALL et les commentaires)
SecRule ARGS "@rx (?i)union.*all.*select" \
    "id:1131,phase:2,t:lowercase,t:removeComments,deny,status:403,log,msg:'SQLi Bypass attempt: UNION ALL SELECT detected'"

# 3. Bloquer les tentatives d'extraction de schéma PostgreSQL (pg_catalog)
# Car sqlmap a réussi à lister tes tables 'public'
SecRule ARGS "@rx (?i)(pg_catalog|information_schema|pg_tables)" \
    "id:1132,phase:2,t:lowercase,deny,status:403,log,msg:'PostgreSQL Schema enumeration detected'"


# Règle de test : bloque tout ce qui contient le mot "pamplemousse"
SecRule ARGS "pamplemousse" "id:99999,phase:1,deny,status:403,log,msg:'TEST-WAF-LOADED'"