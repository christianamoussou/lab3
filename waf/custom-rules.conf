# ============================================================
# 🔐 INITIALISATION (IP tracking pour rate limit / bruteforce)
# ============================================================
SecAction "id:900001,phase:1,initcol:ip=%{REMOTE_ADDR},nolog"

# ============================================================
# 🚫 1. BLOQUER SCANNERS & AUTOMATION
# ============================================================
SecRule REQUEST_HEADERS:User-Agent "@rx (sqlmap|nikto|nmap|wpscan|acunetix|curl|python-requests|libwww|httpclient)" \
"id:1001,phase:1,deny,status:403,msg:'Scanner detected',log"

# ============================================================
# 💉 2. SQL INJECTION (ADVANCED + BYPASS)
# ============================================================
SecRule ARGS|REQUEST_URI "@rx (?i)(union.*select|select.*from|insert into|drop table|or\s+1=1|--|#|sleep\(|benchmark\()" \
"id:1101,phase:2,deny,status:403,msg:'SQLi detected',log"

# Encoded SQLi bypass
SecRule ARGS "@rx (%27|%23|%2D%2D|%3D)" \
"id:1102,phase:2,deny,status:403,msg:'Encoded SQLi attempt',log"

# JSON / API SQLi
SecRule REQUEST_BODY "@rx (?i)(\".*select.*from.*\")" \
"id:1103,phase:2,deny,status:403,msg:'SQLi in JSON',log"

# ============================================================
# 🧠 3. XSS (REFLECTED + STORED + BYPASS)
# ============================================================
SecRule ARGS "@rx (?i)(<script|javascript:|onerror=|onload=|alert\(|document\.cookie)" \
"id:1201,phase:2,deny,status:403,msg:'XSS detected',log"

# Encoded XSS bypass
SecRule ARGS "@rx (%3Cscript%3E|%3Cimg|%3Csvg)" \
"id:1202,phase:2,deny,status:403,msg:'Encoded XSS',log"

# DOM-based indicators
SecRule ARGS "@rx (innerHTML|document\.write|eval\()" \
"id:1203,phase:2,deny,status:403,msg:'DOM XSS attempt',log"

# ============================================================
# 🔁 4. CSRF (BASIQUE MAIS UTILE)
# ============================================================
#SecRule REQUEST_METHOD "POST" \
#"chain,id:1301,phase:1,deny,status:403,msg:'CSRF suspected',log"
#SecRule &REQUEST_HEADERS:Origin "@eq 0"

# ============================================================
# 🔓 5. IDOR / ACCÈS ANORMAL
# ============================================================
SecRule REQUEST_URI "@rx (/user/\d+|/account/\d+|id=\d+)" \
"id:1401,phase:2,pass,nolog,setvar:ip.idor_attempt=+1"

SecRule IP:idor_attempt "@gt 20" \
"id:1402,phase:2,deny,status:403,msg:'Possible IDOR scanning',log"

# ============================================================
# 🔐 6. AUTH / BRUTE FORCE
# ============================================================
SecRule REQUEST_URI "@rx (/login|/auth)" \
"id:1501,phase:2,pass,setvar:ip.login_attempt=+1"

SecRule IP:login_attempt "@gt 10" \
"id:1502,phase:2,deny,status:403,msg:'Bruteforce detected',log"

# ============================================================
# ⚡ 7. RCE / COMMAND INJECTION
# ============================================================
SecRule ARGS "@rx (?i)(;|&&|\|\||`|\$\(.*\)|/bin/sh|/bin/bash|wget|curl http)" \
"id:1601,phase:2,deny,status:403,msg:'Command Injection detected',log"

# ============================================================
# ☣️ 8. LOG4SHELL (CRITIQUE)
# ============================================================
SecRule REQUEST_HEADERS|ARGS|REQUEST_BODY "@rx (\$\{jndi:(ldap|rmi|dns|http):\/\/)" \
"id:1701,phase:1,deny,status:403,msg:'Log4Shell attempt',log"

# Encoded Log4Shell bypass
SecRule REQUEST_HEADERS|ARGS "@rx (%24%7Bjndi)" \
"id:1702,phase:1,deny,status:403,msg:'Encoded Log4Shell',log"

# ============================================================
# 📂 9. PATH TRAVERSAL
# ============================================================
SecRule REQUEST_URI "@rx (\.\./|\.\.\\)" \
"id:1801,phase:1,deny,status:403,msg:'Path Traversal detected',log"

# ============================================================
# 🚀 10. RATE LIMIT GLOBAL
# ============================================================
SecRule IP:REQUESTS "@gt 200" \
"id:1901,phase:1,deny,status:403,msg:'Too many requests',log"

# ============================================================
# 🧠 11. TUNING (ANTI FAUX POSITIFS)
# ============================================================

# Autoriser JSON API propre
SecRule REQUEST_HEADERS:Content-Type "application/json" \
"id:900100,phase:1,pass,nolog"

# Autoriser paramètres classiques (search, q)
SecRule ARGS_NAMES "@rx (search|q|query)" \
"id:900101,phase:1,pass,nolog"

# Ignorer petits scripts légitimes (ex: blog)
SecRule ARGS "<script>" \
"id:900102,phase:2,pass,nolog,ctl:ruleRemoveById=1201"