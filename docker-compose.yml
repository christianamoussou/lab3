services:

  # ─── PostgreSQL ──────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: techmart_db
    environment:
      POSTGRES_DB:       techmart
      POSTGRES_USER:     techmart
      POSTGRES_PASSWORD: techmart123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - lab_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U techmart -d techmart"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── TechMart ────────────────────────────────────────────────
  techmart_app:
    build:
      context: ./techmart
    container_name: techmart_app
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: techmart
      DB_USER: techmart
      DB_PASS: techmart123
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - lab_net

  # ─── WAF ─────────────────────────────────────────────────────
  waf:
    build:
      context: ./waf
    container_name: central_waf
    ports:
      - "8080:8080"
    environment:
      #- MODSECURITY_SEC_RULE_ENGINE=DetectionOnly
      #- SEC_RULE_ENGINE=DetectionOnly
      - MODSECURITY_SEC_RULE_ENGINE=On
      - SEC_RULE_ENGINE=On
      - PARANOIA=2
      - MODSECURITY_AUDIT_LOG_FORMAT=JSON
    volumes:
      - ./nginx.conf:/etc/nginx/templates/conf.d/default.conf.template:ro
      - waf_logs:/var/log/nginx
    depends_on:
      - techmart_app
    restart: unless-stopped
    networks:
      - lab_net

  # ─── Loki ────────────────────────────────────────────────────
  loki:
    image: grafana/loki:2.9.0
    container_name: loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped
    networks:
      - lab_net

  # ─── Promtail ────────────────────────────────────────────────
  promtail:
    image: grafana/promtail:2.9.0
    container_name: promtail
    volumes:
      - waf_logs:/var/log/nginx:ro
      - ./promtail-config.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    restart: unless-stopped
    networks:
      - lab_net

  # ─── Grafana ─────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.2.0
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - loki
    restart: unless-stopped
    networks:
      - lab_net

volumes:
  postgres_data:
  waf_logs:
  grafana_data:

networks:
  lab_net:
    driver: bridge
