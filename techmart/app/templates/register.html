{% extends "base.html" %}
{% block title %}Inscription{% endblock %}
{% block content %}
<div style="max-width:460px;margin:0 auto">
  <div class="card">
    <div class="card-header" style="text-align:center;font-size:1.2rem">📝 Créer un compte</div>
    <div class="alert alert-vuln">⚠️ <strong>Auth Vuln :</strong> Mots de passe stockés en <strong>clair</strong> dans la BDD. Aucun hashage, aucune validation de complexité.</div>
    {% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
    <form method="post" action="/register">
      <div class="form-group">
        <label>Nom d'utilisateur</label>
        <input type="text" name="username" placeholder="ex: alice" required>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" placeholder="alice@example.com" required>
      </div>
      <div class="form-group">
        <label>Mot de passe <span class="vuln-tag">stocké en clair</span></label>
        <input type="password" name="password" placeholder="N'importe quel mot de passe" required>
      </div>
      <button type="submit" class="btn btn-primary btn-lg btn-block">Créer le compte</button>
    </form>
    <hr style="margin:1rem 0">
    <div style="text-align:center;font-size:.87rem">Déjà un compte ? <a href="/login">Se connecter</a></div>
  </div>
</div>
{% endblock %}
