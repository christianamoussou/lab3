{% extends "base.html" %}
{% block content %}
<div class="admin-layout">
  <div class="admin-nav">
    <div class="admin-nav-hdr">⚙️ Panel Admin</div>
    <a href="/admin" class="{{ 'active' if request.path == '/admin' }}">📊 Dashboard</a>
    <a href="/admin/products" class="{{ 'active' if '/admin/products' in request.path }}">📦 Produits</a>
    <a href="/admin/orders" class="{{ 'active' if '/admin/orders' in request.path }}">🛒 Commandes</a>
    <a href="/admin/users" class="{{ 'active' if '/admin/users' in request.path }}">👥 Utilisateurs</a>
    <a href="/" style="border-top:2px solid var(--border);margin-top:.5rem">← Retour au site</a>
  </div>
  <div>{% block admin_content %}{% endblock %}</div>
</div>
{% endblock %}
