server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: waf_access
    static_configs:
      - targets:
          - localhost
        labels:
          job: waf
          app: central_waf
          __path__: /var/log/nginx/waf_access.log

  - job_name: waf_modsecurity
    static_configs:
      - targets:
          - localhost
        labels:
          job: modsecurity
          app: central_waf
          __path__: /var/log/nginx/modsec_audit.log
    pipeline_stages:
      - json:
          expressions:
            transaction: transaction
            severity: severity
      - labels:
          severity: