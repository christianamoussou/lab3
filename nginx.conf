server {
    listen 8080;

    access_log /var/log/nginx/waf_access.log;
    error_log  /var/log/nginx/waf_error.log warn;

    #modsecurity_rules_file /etc/modsecurity.d/owasp-crs/rules/RESPONSE-999-CUSTOM.conf

    location / {
        proxy_pass         http://techmart_app:5000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        add_header X-WAF-Status  "ModSecurity-Active" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;

        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
    }
}
