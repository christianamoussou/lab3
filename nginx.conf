server {
    listen 8080; # Le conteneur écoute sur 80 en interne

    # ── TechMart ──────────────────────────────────────────
    location /techmart/ {
        proxy_pass http://techmart_app:5000/;   # le / final strip le préfixe

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Prefix /techmart;

        # ① Corrige les redirects HTTP (Location: /login → /techmart/login)
        proxy_redirect ~^/(.*)$ /techmart/$1;

        # ② Corrige les URLs dans le HTML (href="/..." src="/..." action="/...")
        sub_filter_once off;
        sub_filter_types text/html;
        sub_filter 'href="/'   'href="/techmart/';
        sub_filter 'src="/'    'src="/techmart/';
        sub_filter 'action="/' 'action="/techmart/';
    }

    # ── SecureBlog ────────────────────────────────────────
    location /secureblog/ {
        proxy_pass http://secureblog_app:5000/;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Prefix /secureblog;

        proxy_redirect ~^/(.*)$ /secureblog/$1;

        sub_filter_once off;
        sub_filter_types text/html;
        sub_filter 'href="/'   'href="/secureblog/';
        sub_filter 'src="/'    'src="/secureblog/';
        sub_filter 'action="/' 'action="/secureblog/';
    }
}