server {
    listen 8080;

    # ── Logs vers fichiers (nécessaire pour Promtail) ─────────
    # Noms différents pour éviter les symlinks stdout/stderr de l'image de base
    access_log  /var/log/nginx/waf_access.log;
    error_log   /var/log/nginx/waf_error.log warn;

    # ── TechMart ──────────────────────────────────────────
    location /techmart/ {
        proxy_pass http://techmart_app:5000/;   # le / final strip le préfixe
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Header personnalisé pour indiquer que le WAF est actif
        add_header X-WAF-Status "ModSecurity-Active" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

}
